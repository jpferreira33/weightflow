url: https://jpferreira33.github.io/weightflow/
template:
  bootstrap: 5
  bslib:
    primary: "#3d3580"
    secondary: "#7a6ad0"
    success: "#1d9e75"
    info: "#534ab7"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}
    "link-color": "#534ab7"
    "link-hover-color": "#3d3580"
    "border-radius": "0.5rem"
    "code-color": "#7a3d1d"

navbar:
  bg: primary
  type: dark
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: Get started
        href: articles/weightflow.html
      - text: -------
      - text: "Case studies"
      - text: A full pipeline on a real survey (ECH 2019)
        href: articles/ech-case-study.html
      - text: -------
      - text: "Methods"
      - text: "Calibration: raking, post-stratification and GREG"
        href: articles/calibration.html
      - text: Model calibration (model-assisted weighting)
        href: articles/model-calibration.html
      - text: "Nonresponse: weighting classes and propensities"
        href: articles/nonresponse-propensities.html
      - text: Machine learning, cross-fitting and robust calibration
        href: articles/advanced-methods.html
      - text: Variance estimation
        href: articles/variance-estimation.html
      - text: Validation against the survey package
        href: articles/validation-against-survey.html

development:
  mode: auto

articles:
- title: Get started
  navbar: ~
  contents:
  - weightflow
- title: Case studies
  desc: The full pipeline on real survey data.
  contents:
  - articles/ech-case-study
- title: Methods
  desc: Focused articles on each part of the workflow.
  contents:
  - calibration
  - model-calibration
  - nonresponse-propensities
  - advanced-methods
  - variance-estimation
  - validation-against-survey

reference:
- title: Overview
  contents:
  - weightflow-package
- title: Build and run a recipe
  desc: Define the recipe, estimate it, and pull the weights out.
  contents:
  - weighting_spec
  - prep
  - collect_weights
  - y_model
- title: Adjustment steps
  desc: The staged adjustments, applied in the order you pipe them.
  contents:
  - step_unknown_eligibility
  - step_drop_ineligible
  - step_select_within
  - step_nonresponse
  - step_calibrate
  - step_model_calibration
  - step_trim
  - step_trim_weights
  - step_round
  - step_rescale
  - step_assert
- title: Diagnostics and reporting
  desc: Inspect, summarise and report the cascade.
  contents:
  - summary.prepped_weighting_spec
  - plot.prepped_weighting_spec
  - weight_factors
  - design_effect
  - report_weighting
- title: Variance estimation
  desc: Bootstrap that re-applies the recipe, plus survey/srvyr bridges.
  contents:
  - bootstrap_weights
  - bootstrap_estimate
  - as_svydesign
  - collect_replicate_weights
- title: Example data
  contents:
  - population
  - sample_survey
  - sample_one
