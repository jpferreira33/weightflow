url: https://jpferreira33.github.io/weightflow/

template:
  bootstrap: 5
  bslib:
    primary: "#3d3580"
    secondary: "#7a6ad0"
    success: "#1d9e75"
    info: "#534ab7"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}
    "link-color": "#534ab7"
    "link-hover-color": "#3d3580"
    "border-radius": "0.5rem"
    "code-color": "#7a3d1d"

navbar:
  bg: primary
  type: dark
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: The weighting cascade
      - text: "Preparing the sample: eligibility and response before weighting"
        href: articles/preparing-the-sample.html
      - text: "Nonresponse: weighting classes and propensities"
        href: articles/nonresponse-propensities.html
      - text: "Calibration: raking, post-stratification and GREG"
        href: articles/calibration.html
      - text: "Ways to specify calibration totals"
        href: articles/calibration-totals.html
      - text: "Model calibration (model-assisted weighting)"
        href: articles/model-calibration.html
      - text: "Machine learning, cross-fitting and robust calibration"
        href: articles/advanced-methods.html
      - text: Case study
      - text: "A full weighting pipeline on a real household survey (ECH 2019)"
        href: articles/ech-case-study.html
      - text: Variance and validation
      - text: "Variance estimation"
        href: articles/variance-estimation.html
      - text: "Validation against the survey package"
        href: articles/validation-against-survey.html

development:
  mode: auto

articles:
- title: Get started
  navbar: ~
  contents:
  - weightflow
- title: The weighting cascade
  navbar: ~
  contents:
  - preparing-the-sample
  - nonresponse-propensities
  - calibration
  - calibration-totals
  - model-calibration
  - advanced-methods
- title: Case study
  navbar: ~
  contents:
  - articles/ech-case-study
- title: Variance and validation
  navbar: ~
  contents:
  - variance-estimation
  - validation-against-survey

reference:
- title: Overview
  contents:
  - weightflow-package
- title: Build and run a recipe
  desc: Define the recipe, estimate it, and pull the weights out.
  contents:
  - weighting_spec
  - prep
  - collect_weights
  - y_model
- title: Adjustment steps
  desc: The staged adjustments, applied in the order you pipe them.
  contents:
  - step_unknown_eligibility
  - step_drop_ineligible
  - step_select_within
  - step_nonresponse
  - step_calibrate
  - step_model_calibration
  - step_trim
  - step_trim_weights
  - step_round
  - step_rescale
  - step_assert
- title: Diagnostics and reporting
  desc: Inspect, summarise and report the cascade.
  contents:
  - summary.prepped_weighting_spec
  - plot.prepped_weighting_spec
  - weight_factors
  - design_effect
  - report_weighting
- title: Variance estimation
  desc: Bootstrap and jackknife that re-apply the recipe, plus survey/srvyr bridges.
  contents:
  - bootstrap_weights
  - bootstrap_estimate
  - jackknife_weights
  - jackknife_estimate
  - as_svydesign
  - collect_replicate_weights
- title: Example data
  contents:
  - population
  - sample_survey
  - sample_one
