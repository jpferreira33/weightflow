<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 470" width="100%" style="max-width:720px; font-family: Inter, system-ui, sans-serif;" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Survey disposition tree: sampled cases split into eligible, unknown eligibility and ineligible; eligible cases split into respondents and nonrespondents.">
  <!-- connectors -->
  <g stroke="#c7c9d6" stroke-width="1.6" fill="none">
    <path d="M380 68 L180 150"/>
    <path d="M380 68 L367 150"/>
    <path d="M380 68 L600 150"/>
    <path d="M180 202 L110 290"/>
    <path d="M180 202 L250 290"/>
  </g>

  <!-- root -->
  <rect x="300" y="20" width="160" height="48" rx="9" fill="#3d3580"/>
  <text x="380" y="41" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Sampled cases</text>
  <text x="380" y="58" text-anchor="middle" fill="#d7d3f0" font-size="10.5">carry the design base weight</text>

  <!-- level 2: eligibility -->
  <rect x="105" y="150" width="150" height="52" rx="9" fill="#534ab7"/>
  <text x="180" y="173" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Eligible</text>
  <text x="180" y="190" text-anchor="middle" fill="#dcd9f4" font-size="10.5">in the target population</text>

  <rect x="280" y="150" width="175" height="52" rx="9" fill="#7a6ad0"/>
  <text x="367" y="173" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Unknown eligibility</text>
  <text x="367" y="190" text-anchor="middle" fill="#eae7f8" font-size="10.5">never resolved</text>

  <rect x="520" y="150" width="160" height="52" rx="9" fill="#8a90a0"/>
  <text x="600" y="173" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Ineligible</text>
  <text x="600" y="190" text-anchor="middle" fill="#eef0f4" font-size="10.5">out of scope</text>

  <!-- level 3: response, under eligible -->
  <rect x="50" y="290" width="120" height="50" rx="9" fill="#1d9e75"/>
  <text x="110" y="312" text-anchor="middle" fill="#ffffff" font-size="13.5" font-weight="600">Respondent</text>
  <text x="110" y="328" text-anchor="middle" fill="#dcf3ea" font-size="10.5">provides data</text>

  <rect x="180" y="290" width="140" height="50" rx="9" fill="#cf7a33"/>
  <text x="250" y="312" text-anchor="middle" fill="#ffffff" font-size="13.5" font-weight="600">Nonrespondent</text>
  <text x="250" y="328" text-anchor="middle" fill="#f7e6d5" font-size="10.5">no data</text>

  <!-- step annotations -->
  <text x="367" y="222" text-anchor="middle" fill="#534ab7" font-size="11" font-weight="600">step_unknown_eligibility()</text>
  <text x="367" y="237" text-anchor="middle" fill="#6b7280" font-size="10.5">weight redistributed to resolved cases</text>

  <text x="600" y="222" text-anchor="middle" fill="#534ab7" font-size="11" font-weight="600">step_drop_ineligible()</text>
  <text x="600" y="237" text-anchor="middle" fill="#6b7280" font-size="10.5">weight set to 0 (removed)</text>

  <text x="110" y="360" text-anchor="middle" fill="#6b7280" font-size="10.5">kept as is</text>

  <text x="250" y="360" text-anchor="middle" fill="#534ab7" font-size="11" font-weight="600">step_nonresponse()</text>
  <text x="250" y="375" text-anchor="middle" fill="#6b7280" font-size="10.5">respondents inflated to represent them</text>

  <!-- within-household note -->
  <text x="180" y="262" text-anchor="middle" fill="#6b7280" font-size="10.5">if one person is selected per household:</text>
  <text x="180" y="277" text-anchor="middle" fill="#534ab7" font-size="11" font-weight="600">step_select_within()</text>
</svg>
